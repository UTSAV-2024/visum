<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#070B12"/>
      <stop offset="100%" stop-color="#0C1A2E"/>
    </linearGradient>
    <linearGradient id="mark" x1="52" y1="10" x2="20" y2="56" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#5CC8FF"/>
      <stop offset="55%" stop-color="#2A8FE8"/>
      <stop offset="100%" stop-color="#1657C4"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5CC8FF"/>
      <stop offset="100%" stop-color="#1657C4"/>
    </linearGradient>
    <!-- Black = removed. Opens a ring of space for the lens and its handle. -->
    <mask id="lens">
      <rect width="64" height="64" fill="white"/>
      <circle cx="39" cy="34" r="9.5" fill="black"/>
      <line x1="44" y1="39" x2="48.8" y2="43.8" stroke="black" stroke-width="7" stroke-linecap="round"/>
    </mask>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.05" fill="#fff">
    <circle cx="100" cy="100" r="2"/><circle cx="300" cy="100" r="2"/><circle cx="500" cy="100" r="2"/>
    <circle cx="700" cy="100" r="2"/><circle cx="900" cy="100" r="2"/><circle cx="1100" cy="100" r="2"/>
    <circle cx="100" cy="300" r="2"/><circle cx="300" cy="300" r="2"/><circle cx="500" cy="300" r="2"/>
    <circle cx="700" cy="300" r="2"/><circle cx="900" cy="300" r="2"/><circle cx="1100" cy="300" r="2"/>
    <circle cx="100" cy="500" r="2"/><circle cx="300" cy="500" r="2"/><circle cx="500" cy="500" r="2"/>
    <circle cx="700" cy="500" r="2"/><circle cx="900" cy="500" r="2"/><circle cx="1100" cy="500" r="2"/>
  </g>

  <!-- Logo mark + wordmark -->
  <g transform="translate(80 72) scale(1.35)">
    <g mask="url(#lens)">
      <path d="M12 14 H23 L32 41 L41 14 H52 L34.5 56 H29.5 Z" fill="url(#mark)"/>
      <g fill="url(#mark)">
        <rect x="7.5" y="11" width="4" height="4" opacity="0.9"/>
        <rect x="3.5" y="13.5" width="3" height="3" opacity="0.6"/>
        <rect x="8" y="6" width="3" height="3" opacity="0.7"/>
        <rect x="3" y="8.5" width="2.5" height="2.5" opacity="0.45"/>
        <rect x="11.5" y="3" width="2.5" height="2.5" opacity="0.5"/>
        <rect x="6.5" y="1.5" width="2" height="2" opacity="0.3"/>
        <rect x="1" y="3.5" width="2" height="2" opacity="0.25"/>
      </g>
    </g>
    <circle cx="39" cy="34" r="7" fill="none" stroke="url(#mark)" stroke-width="3.2"/>
    <line x1="44" y1="39" x2="48.8" y2="43.8" stroke="url(#mark)" stroke-width="3.2" stroke-linecap="round"/>
  </g>
  <text x="176" y="128" font-family="system-ui, sans-serif" font-size="38" font-weight="bold" letter-spacing="10" fill="#ffffff">VISUM</text>

  <!-- Title -->
  <text x="80" y="290" font-family="system-ui, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">AI reads your website.</text>
  <text x="80" y="368" font-family="system-ui, sans-serif" font-size="72" font-weight="bold" fill="#5CC8FF">Badly, probably.</text>

  <!-- Subtitle -->
  <text x="80" y="428" font-family="system-ui, sans-serif" font-size="28" fill="#a1a1aa">The 8 checks machines run before they trust your site.</text>

  <!-- Badge -->
  <rect x="80" y="468" width="272" height="50" rx="25" fill="url(#accent)" opacity="0.9"/>
  <text x="216" y="501" font-family="system-ui, sans-serif" font-size="20" font-weight="bold" fill="#06121F" text-anchor="middle">3 free scans · ~20 seconds</text>

  <!-- URL -->
  <text x="80" y="576" font-family="system-ui, sans-serif" font-size="22" fill="#6b7280">visum.io</text>

  <!-- Decorative element -->
  <circle cx="1050" cy="500" r="180" fill="url(#accent)" opacity="0.08"/>
  <circle cx="1050" cy="500" r="120" fill="url(#accent)" opacity="0.06"/>
</svg>
